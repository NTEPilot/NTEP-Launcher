tips:
  0: "NTEP Launcher 會自動準備本機 Python 環境。"
  1: "後端服務固定監聽 http://127.0.0.1:9150。"
  2: "依賴同步會使用後端 uv.lock，確保啟動環境可重現。"
  3: "啟動器會直接啟動 main.py，不傳任何額外命令列參數。"
  4: "如果啟動較慢，可能正在同步 Python 依賴。"
  5: "發行包會包含同名發布 tag 的後端檔案。"
  6: "執行工具會複製到 .venv 中，便於自包含啟動。"
  7: "啟動器日誌可以協助排查本機啟動失敗。"
  8: "存在 main.py、pyproject.toml 和 uv.lock 時，工作區才有效。"
  9: "macOS 下後端檔案位於 NTEP Launcher.app/Contents/NTEPilot。"
  10: "啟動器只專注於本機執行環境準備。"
  11: "缺少託管 Python 時，會透過 uv 自動安裝。"
  12: "啟動器執行環境只準備 Python 和 uv。"
  13: "本機 WebUI 回應後，主視窗會自動開啟。"
  14: "重建執行環境只會移除產生的執行檔案。"
  15: "發布封存會以 NTEPilot 工作區為包根。"
  16: "只有安裝執行依賴時才需要網路存取。"
  17: "NTEP Launcher 正在啟動本機服務。"
  18: "啟動失敗後，可以查看啟動器日誌再重試。"

