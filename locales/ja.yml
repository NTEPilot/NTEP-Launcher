tips:
  0: "NTEP Launcher はローカル Python 環境を自動で準備します。"
  1: "バックエンドサービスは http://127.0.0.1:9150 で待ち受けます。"
  2: "依存関係の同期にはバックエンドの uv.lock を使用します。"
  3: "ランチャーは追加引数なしで main.py を直接起動します。"
  4: "起動が遅い場合は、Python 依存関係を同期している可能性があります。"
  5: "配布パッケージには同じリリース tag のバックエンドファイルが含まれます。"
  6: "実行ツールは自己完結起動のため .venv にコピーされます。"
  7: "ランチャーログはローカル起動失敗の調査に役立ちます。"
  8: "main.py、pyproject.toml、uv.lock がある場所を有効なワークスペースとして扱います。"
  9: "macOS ではバックエンドファイルは NTEP Launcher.app/Contents/NTEPilot にあります。"
  10: "ランチャーはローカル実行環境の準備に集中します。"
  11: "管理対象 Python がない場合は uv で自動インストールします。"
  12: "ランチャーの実行環境は Python と uv だけを準備します。"
  13: "ローカル WebUI が応答するとメインウィンドウが開きます。"
  14: "実行環境の再構築では生成された実行ファイルのみを削除します。"
  15: "リリースアーカイブは NTEPilot ワークスペースをルートにして作成します。"
  16: "ネットワークアクセスは実行依存関係のインストール時にだけ必要です。"
  17: "NTEP Launcher がローカルサービスを起動しています。"
  18: "起動に失敗した場合はランチャーログを確認してから再試行できます。"

