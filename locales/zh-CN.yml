tips:
  0: "NTEP Launcher 会自动准备本地 Python 环境。"
  1: "后端服务固定监听 http://127.0.0.1:9150。"
  2: "依赖同步会使用后端 uv.lock，确保启动环境可复现。"
  3: "启动器会直接启动 main.py，不传任何额外命令行参数。"
  4: "如果启动较慢，可能正在同步 Python 依赖。"
  5: "发行包会包含同名发布 tag 的后端文件。"
  6: "运行工具会复制到 .venv 中，便于自包含启动。"
  7: "启动器日志可以帮助排查本地启动失败。"
  8: "存在 main.py、pyproject.toml 和 uv.lock 时，工作区才有效。"
  9: "macOS 下后端文件位于 NTEP Launcher.app/Contents/NTEPilot。"
  10: "启动器只专注于本地运行环境准备。"
  11: "缺少托管 Python 时，会通过 uv 自动安装。"
  12: "启动器运行环境只准备 Python 和 uv。"
  13: "本地 WebUI 响应后，主窗口会自动打开。"
  14: "重建运行环境只会移除生成的运行文件。"
  15: "发布归档会以 NTEPilot 工作区为包根。"
  16: "只有安装运行依赖时才需要网络访问。"
  17: "NTEP Launcher 正在启动本地服务。"
  18: "启动失败后，可以查看启动器日志再重试。"

