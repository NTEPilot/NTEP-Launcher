name: Pack NTEP Launcher

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.3 or v1.2.3
        required: true

env:
  UV_MANAGED_PYTHON: 1
  UV_PYTHON_INSTALL_DIR: ${{ github.workspace }}/python
  UV_PYTHON: 3.14.3

jobs:
  package:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest, windows-11-arm]

    steps:
      - name: Install Tauri dependencies (Ubuntu only)
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Get rdfind
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: sudo apt-get install -y rdfind
          macos: brew install rdfind
      - name: Checkout launcher
        uses: actions/checkout@v4
      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          $rawVersion = if ('${{ github.ref_type }}' -eq 'tag') { '${{ github.ref_name }}' } else { '${{ inputs.version }}' }
          $version = $rawVersion -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$') {
            throw "Release version '$rawVersion' must be SemVer, for example 1.2.3 or v1.2.3"
          }
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=$rawVersion" >> $env:GITHUB_ENV
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$rawVersion" >> $env:GITHUB_OUTPUT

          $cargo = Get-Content Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^(version\s*=\s*")[^"]+(")', "`${1}$version`${2}"
          Set-Content Cargo.toml $cargo -NoNewline

          $tauri = Get-Content tauri.conf.json -Raw
          $tauri = $tauri -replace '("version"\s*:\s*")[^"]+(")', "`${1}$version`${2}"
          Set-Content tauri.conf.json $tauri -NoNewline

          $plist = Get-Content Info.plist -Raw
          $plist = $plist -replace '(<key>CFBundleShortVersionString</key>\s*<string>)[^<]+(</string>)', "`${1}$version`${2}"
          $plist = $plist -replace '(<key>CFBundleVersion</key>\s*<string>)[^<]+(</string>)', "`${1}$version`${2}"
          Set-Content Info.plist $plist -NoNewline
      - name: Checkout NTEPilot backend
        uses: actions/checkout@v4
        with:
          repository: NTEPilot/NTEPilot
          ref: ${{ steps.release_version.outputs.tag }}
          path: NTEPilot-src
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        working-directory: NTEPilot-src/frontend
        run: |
          npm install
          npm run build
      - name: Clean frontend dependencies
        if: always()
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: rm -rf NTEPilot-src/frontend/node_modules
          macos: rm -rf NTEPilot-src/frontend/node_modules
          windows: rm -r -fo NTEPilot-src\frontend\node_modules -ErrorAction SilentlyContinue
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Expose uv path
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            echo "NTEP_BOOTSTRAP_UV=$(command -v uv)" >> "$GITHUB_ENV"
          macos: |
            echo "NTEP_BOOTSTRAP_UV=$(command -v uv)" >> "$GITHUB_ENV"
          windows: |
            "NTEP_BOOTSTRAP_UV=$((Get-Command uv).Source)" >> $env:GITHUB_ENV
      - name: Rustup for cache
        run: rustup toolchain install stable --profile minimal
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Inno Setup (Windows only)
        if: ${{ startsWith(matrix.os, 'windows-') }}
        run: choco install innosetup --no-progress -y
      - name: Build launcher
        run: cargo build --verbose --release
      - name: Package
        uses: knicknic/os-specific-run@v1.0.3
        with:
          macos: |
            set -eux
            rm -rf package-root "NTEP Launcher.app"
            mkdir -p package-root/NTEPilot
            ditto NTEPilot-src package-root/NTEPilot
            rm -rf package-root/NTEPilot/.git

            cd package-root/NTEPilot
            mkdir -p .venv/bin
            export UV_PYTHON_INSTALL_DIR="$PWD/.venv/python"
            uv python install --install-dir .venv/python --no-bin --managed-python 3.14.3
            python_home="$(find .venv/python -maxdepth 1 -type d -name 'cpython-3.14.3-*' | head -n1)"
            uv venv --allow-existing --relocatable --python "$python_home/bin/python3.14" .venv
            cp "$NTEP_BOOTSTRAP_UV" .venv/bin/uv
            chmod +x .venv/bin/uv
            .venv/bin/python -c 'import sys; print(sys.version)'
            .venv/bin/uv --version

            cd ${{ github.workspace }}
            mkdir -p "NTEP Launcher.app/Contents/MacOS"
            cp target/release/ntep-launcher "NTEP Launcher.app/Contents/MacOS/"
            mkdir -p "NTEP Launcher.app/Contents/Resources"
            cp icons/icon.icns "NTEP Launcher.app/Contents/Resources/"
            ditto package-root/NTEPilot "NTEP Launcher.app/Contents/NTEPilot"
            cp Info.plist "NTEP Launcher.app/Contents/"
            rdfind -minsize 128 -makehardlinks true "NTEP Launcher.app"
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('NTEP-Launcher-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('NTEP Launcher.app')
            EOF
          linux: |
            set -eux
            rm -rf package-root
            mkdir -p package-root/NTEPilot
            cp -a NTEPilot-src/. package-root/NTEPilot/
            rm -rf package-root/NTEPilot/.git

            cd package-root/NTEPilot
            mkdir -p .venv/bin
            export UV_PYTHON_INSTALL_DIR="$PWD/.venv/python"
            uv python install --install-dir .venv/python --no-bin --managed-python 3.14.3
            python_home="$(find .venv/python -maxdepth 1 -type d -name 'cpython-3.14.3-*' | head -n1)"
            uv venv --allow-existing --relocatable --python "$python_home/bin/python3.14" .venv
            cp "$NTEP_BOOTSTRAP_UV" .venv/bin/uv
            chmod +x .venv/bin/uv
            cp ../../target/release/ntep-launcher ntep-launcher
            .venv/bin/python -c 'import sys; print(sys.version)'
            .venv/bin/uv --version

            cd ${{ github.workspace }}
            rdfind -minsize 128 -makehardlinks true package-root/NTEPilot
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('NTEP-Launcher-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/NTEPilot', arcname='NTEPilot')
            EOF
          windows: |
            rm -r -fo package-root -ErrorAction SilentlyContinue
            mkdir -ea 0 package-root\NTEPilot
            robocopy NTEPilot-src package-root\NTEPilot /E /XD .git
            if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
            rm -r -fo package-root\NTEPilot\.git -ErrorAction SilentlyContinue

            cd package-root\NTEPilot
            $env:UV_PYTHON_INSTALL_DIR = "$PWD\.venv\python"
            uv python install --install-dir .venv\python --no-bin --managed-python 3.14.3
            $python_home = Get-ChildItem .venv\python -Directory | Where-Object { $_.Name -like "cpython-3.14.3-*" } | Select-Object -First 1
            uv venv --allow-existing --relocatable --python "$($python_home.FullName)\python.exe" .venv
            cp $env:NTEP_BOOTSTRAP_UV .venv\Scripts\uv.exe
            cp ..\..\target\release\ntep-launcher.exe ntep-launcher.exe
            .venv\Scripts\python.exe -c "import sys; print(sys.version)"
            .venv\Scripts\uv.exe --version

            cd ${{ github.workspace }}
            $installerArch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x64' }
            $isccCandidates = @(
              "${env:ProgramFiles}\Inno Setup 7\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            )
            $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (!$iscc) {
              throw "ISCC.exe was not found"
            }
            & $iscc install.iss "/DTargetArch=$installerArch" "/DAppVersion=$env:RELEASE_VERSION"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NTEP-Launcher-${{ matrix.os }}
          path: |
            NTEP-Launcher-${{ runner.os }}-*
            installer-output/*.exe
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          prerelease: true
          files: |
            NTEP-Launcher-${{ runner.os }}-*
            installer-output/*.exe
